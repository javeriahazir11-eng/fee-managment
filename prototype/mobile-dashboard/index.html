<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mobile Dashboard Prototype</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="menu">☰</button>
      <div class="title">Greenfield School</div>
      <button class="notif">🔔<span class="badge">3</span></button>
    </header>

    <section class="kpis">
      <div class="kpi-card small">Due<br><strong id="kpi-due">$1,200</strong></div>
      <div class="kpi-card small">Collected<br><strong id="kpi-col">$8,400</strong></div>
      <div class="kpi-card small">Pending<br><strong id="kpi-pend">$320</strong></div>
      <div class="kpi-card small">Students<br><strong id="kpi-stu">420</strong></div>
    </section>

    <section class="quick-actions">
      <button class="action">➕ Add Payment</button>
      <button class="action">📄 Receipts</button>
      <button class="action">📣 Notices</button>
      <button class="action">📊 Reports</button>
    </section>

    <section class="recent">
      <h3>Recent Activity</h3>
      <ul id="activity-list">
      </ul>
    </section>

    <button class="fab">＋</button>

    <nav class="bottom-nav">
      <button class="nav-item active">Home</button>
      <button class="nav-item">Payments</button>
      <button class="nav-item">Students</button>
      <button class="nav-item">Reports</button>
      <button class="nav-item">Profile</button>
    </nav>
  </div>

  <script src="./script.js"></script>
</body>
</html>
