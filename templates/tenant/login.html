<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ tenant.name }} Login</title><style>:root{--bg:#f3f4f6;--surface:#fff;--text:#111;--primary:#3b82f6}body{background:var(--bg);font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}.card{background:var(--surface);padding:2rem;border-radius:1rem;width:320px}</style></head>
<body><div class="card"><h2>{{ tenant.name }}</h2>{% if error %}<div style="color:red">{{ error }}</div>{% endif %}<form method="post">{% csrf_token %}<input type="text" name="username" placeholder="Username" required><br><input type="password" name="password" placeholder="Password" required><br><button type="submit">Login</button></form></div></body></html>
