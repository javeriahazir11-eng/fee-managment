<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ tenant.name }} | AXIS Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background blobs */
        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            pointer-events: none;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -80px; right: -80px; background: rgba(16, 185, 129, 0.2); width: 400px; height: 400px; }

        .login-container {
            width: 100%;
            max-width: 440px;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .tenant-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .tenant-icon.gym {
            background: linear-gradient(135deg, #f97316, #ea580c);
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }

        .sub {
            text-align: center;
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            width: auto;
            padding-bottom: 0.5rem;
        }

        .sub-wrapper {
            text-align: center;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #ef4444;
        }

        .error-message svg {
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 18px;
            height: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            background: white;
            transition: all 0.2s;
            font-family: inherit;
            color: #1e293b;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        body.gym-theme .input-group input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: #3b82f6;
            border: none;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button svg {
            width: 18px;
            height: 18px;
            stroke: white;
            stroke-width: 2;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        body.gym-theme button {
            background: #f97316;
        }
        body.gym-theme button:hover {
            background: #ea580c;
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            margin-top: 1.5rem;
            border-top: 1px solid #edf2f7;
            padding-top: 1rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="{% if tenant.tenant_type == 'gym' %}gym-theme{% endif %}">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Dynamic icon based on tenant type -->
            <div class="tenant-icon {% if tenant.tenant_type == 'gym' %}gym{% endif %}">
                {% if tenant.tenant_type == 'gym' %}
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 4L8 6M6 20L8 18M18 4L16 6M18 20L16 18M4 6L6 8M4 18L6 16M20 6L18 8M20 18L18 16M12 8L10 10M12 8L14 10M12 8V12M8 12H12M12 16H16M12 16V12"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                {% else %}
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M12 14l9-5-9-5-9 5 9 5z" />
                        <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    </svg>
                {% endif %}
            </div>
            <h2>{{ tenant.name }}</h2>
            <div class="sub-wrapper">
                <div class="sub">
                    {% if tenant.tenant_type == 'gym' %}
                        Fitness Management Portal
                    {% else %}
                        School Management Portal
                    {% endif %}
                </div>
            </div>

            {% if error %}
                <div class="error-message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ error }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" name="username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h6v6M9 15L21 3"/>
                        <path d="M5 5h6v6H5zM19 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6"/>
                    </svg>
                    {% if tenant.tenant_type == 'gym' %}
                        Access Dashboard
                    {% else %}
                        Sign in
                    {% endif %}
                </button>
            </form>
            <div class="footer-note">
                Powered by <strong>AXIS</strong> • Secure multi‑tenant platform
            </div>
        </div>
    </div>
</body>
</html>
