<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tenant.name }} Login</title>
    <style>
        :root {
            color-scheme: light;
            background: #f8fafc;
            color: #0f172a;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        [data-theme="dark"] {
            background: #0f172a;
            color: #f8fafc;
        }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: inherit; color: inherit; }
        .login-card { width: min(520px, 100%); background: rgba(255,255,255,0.95); border-radius: 28px; padding: 42px; box-shadow: 0 32px 90px rgba(15, 23, 42, 0.18); border: 1px solid rgba(15, 23, 42, 0.08); }
        [data-theme="dark"] .login-card { background: rgba(15, 23, 42, 0.95); border-color: rgba(148, 163, 184, 0.16); }
        h1 { margin: 0 0 10px; font-size: 2rem; color: #0f766e; }
        [data-theme="dark"] h1 { color: #5eead4; }
        p { margin: 0 0 26px; color: #475569; }
        [data-theme="dark"] p { color: #cbd5e1; }
        label { display: block; margin-bottom: 8px; color: #475569; font-size: .95rem; }
        [data-theme="dark"] label { color: #cbd5e1; }
        input { width: 100%; padding: 14px 16px; margin-bottom: 18px; border-radius: 16px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; }
        [data-theme="dark"] input { border-color: #334155; background: #0f172a; color: #e2e8f0; }
        button { width: 100%; padding: 14px 0; border: none; border-radius: 16px; background: #0f766e; color: #ffffff; font-weight: 700; cursor: pointer; }
        .message { margin-bottom: 18px; padding: 14px 16px; border-radius: 18px; background: #fee2e2; color: #991b1b; }
        .meta { margin-top: 24px; color: #64748b; font-size: .95rem; }
        .meta a { color: #0f766e; }
        .theme-toggle { margin-top: 20px; border: 1px solid #cbd5e1; border-radius: 16px; padding: 11px 16px; background: transparent; color: inherit; cursor: pointer; }
        [data-theme="dark"] .theme-toggle { border-color: #334155; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>{{ tenant.name }} Portal</h1>
        <p>Secure school administration access. Use the credentials created by the super admin.</p>

        {% if error %}
            <div class="message">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'school_portal_login' schema_name=tenant.schema_name %}">
            {% csrf_token %}
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>

        <button class="theme-toggle" onclick="toggleTheme()" id="themeButton">Toggle theme</button>
        <div class="meta">Super admin only: use the shared admin panel at <a href="/admin/">/admin/</a>.</div>
    </div>

    <script>
        const root = document.documentElement;
        const currentTheme = localStorage.getItem('schoolPortalTheme');
        if (currentTheme) root.setAttribute('data-theme', currentTheme);

        function toggleTheme() {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('schoolPortalTheme', next);
            document.getElementById('themeButton').textContent = next === 'dark' ? 'Light mode' : 'Dark mode';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const theme = root.getAttribute('data-theme');
            document.getElementById('themeButton').textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
        });
    </script>
</body>
</html>
