{% extends 'tenant/base.html' %}
{% block title %}Settings{% endblock %}
{% block body %}
<h1>Portal Settings</h1>
<div class="card"><form method="post" enctype="multipart/form-data">{% csrf_token %}<div class="form-group"><label>Admin Username</label><input type="text" name="admin_username" value="{{ tenant.admin_username }}"></div><div class="form-group"><label>Admin Password</label><input type="password" name="admin_password" placeholder="New password (leave blank to keep)"></div><div class="form-group"><label>School Logo</label><input type="file" name="school_logo" accept="image/*">{% if logo_url %}<img src="{{ logo_url }}" style="height: 60px; margin-top: 8px;">{% endif %}</div><button class="btn-primary">Save Settings</button></form></div>
{% endblock %}
