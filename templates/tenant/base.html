<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>{% block title %}School Portal{% endblock %}</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-alt: #f1f3f5;
            --text: #1c1e21;
            --muted: #65676b;
            --primary: #1877f2;
            --primary-strong: #166fe5;
            --danger: #e41e3f;
            --border: #e4e6eb;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-alt: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --primary-strong: #0ea5e9;
            --danger: #f87171;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }
        button, input, select, textarea { font: inherit; background: transparent; border: none; }
        
        .app-shell { display: flex; min-height: 100vh; }
        
        /* Fixed Left Panel Configuration */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px 14px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            z-index: 1000;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1), padding 0.2s;
        }
        
        .page-body { 
            margin-left: 260px; 
            flex-grow: 1; 
            padding: 32px 40px; 
            min-height: 100vh;
            transition: margin-left 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .main-content-wrapper {
            flex: 1;
        }
        .app-footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .footer-credits {
            font-weight: 500;
        }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-links a {
            color: var(--muted);
            transition: color 0.15s;
        }
        .footer-links a:hover {
            color: var(--primary);
        }
        
        body.sidebar-collapsed .sidebar { width: 72px; padding: 20px 8px; }
        body.sidebar-collapsed .page-body { margin-left: 72px; }
        
        .brand-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 6px;
            overflow: hidden;
        }
        .brand-core { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .brand-logo { 
            width: 36px; 
            height: 36px; 
            border-radius: 8px; 
            display: grid; 
            place-items: center; 
            background: var(--primary); 
            color: #ffffff; 
            font-weight: 700; 
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .brand-info { transition: opacity 0.15s; white-space: nowrap; }
        .brand-title { font-weight: 600; font-size: 1rem; letter-spacing: -0.01em; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
        .brand-meta { color: var(--muted); font-size: 0.78rem; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
        
        .sidebar-toggle-btn {
            background: transparent;
            cursor: pointer;
            color: var(--muted);
            padding: 6px;
            border-radius: 6px;
            display: grid;
            place-items: center;
        }
        .sidebar-toggle-btn:hover { background: var(--surface-alt); color: var(--text); }
        
        /* Nav Links */
        .sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-nav a { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 10px 12px; 
            border-radius: 8px; 
            color: var(--text); 
            font-size: 0.92rem; 
            font-weight: 500;
            transition: background 0.15s;
        }
        .sidebar-nav a:hover { background: var(--surface-alt); }
        .sidebar-nav a.active { background: var(--surface-alt); color: var(--primary); font-weight: 600; }
        .nav-label { transition: opacity 0.15s; white-space: nowrap; }
        
        body.sidebar-collapsed .brand-info,
        body.sidebar-collapsed .nav-label,
        body.sidebar-collapsed .footer-txt { display: none; opacity: 0; }
        body.sidebar-collapsed .brand-container { justify-content: center; }
        body.sidebar-collapsed .sidebar-toggle-btn { display: none; }
        
        /* Professional Base Bottom Footer & Settings Group block */
        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 6px;
            border-radius: 8px;
        }
        .footer-row-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 500;
            transition: background 0.15s;
            width: 100%;
        }
        .footer-row-link:hover { background: var(--surface-alt); }
        .footer-row-link.active { background: var(--surface-alt); color: var(--primary); font-weight: 600; }
        
        body.sidebar-collapsed .footer-row-link {
            justify-content: center;
            padding: 10px 0;
        }
        body.sidebar-collapsed .footer-row {
            justify-content: center;
            padding: 4px 0;
        }
        
        .footer-txt { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
        .theme-action-icon-btn {
            cursor: pointer;
            color: var(--muted);
            padding: 6px;
            border-radius: 6px;
            display: grid;
            place-items: center;
        }
        .theme-action-icon-btn:hover { background: var(--surface-alt); color: var(--text); }
        
        .page-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); padding: 24px; }
        .page-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
        .page-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
        .page-description { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
        
        .grid-3 { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 20px; }
        .stat-card { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
        .stat-label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.03em; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; color: var(--text); }
        
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 20px; }
        .form-card h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .field-card { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
        .field-card label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .field-card input, .field-card select, .field-card textarea {
            width: 100%; border-radius: 6px; border: 1px solid var(--border); padding: 10px 12px; background: var(--surface-alt); color: var(--text); outline: none; font-size: 0.9rem;
        }
        .field-card input:focus { border-color: var(--primary); background: var(--surface); }
        .field-card button { background: var(--primary); color: #ffffff; padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; width: max-content; }
        .field-card button:hover { background: var(--primary-strong); }
        
        .logout-panel-btn {
            display: inline-flex; align-items: center; gap: 8px; color: var(--danger); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 10px;
        }
        .logout-panel-btn:hover { background: #fff1f2; border-color: #fca5a5; }
        [data-theme="dark"] .logout-panel-btn:hover { background: #7f1d1d; border-color: #ef4444; color: #fff; }

        .logo-preview { height: 36px; width: auto; object-fit: contain; border-radius: 4px; }
        .message-success { padding: 12px 14px; border-radius: 6px; background: #e6f4ea; color: #137333; font-size: 0.88rem; margin-bottom: 16px; border-left: 4px solid #137333; }
        
        @media (max-width: 768px) {
            .sidebar { width: 72px; padding: 20px 8px; }
            .sidebar .brand-info, .sidebar .nav-label, .sidebar .footer-txt { display: none; }
            .sidebar .brand-container { justify-content: center; }
            .sidebar .sidebar-toggle-btn { display: none; }
            .page-body { margin-left: 72px; padding: 16px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    <script>
        const root = document.documentElement;
        const currentTheme = localStorage.getItem('schoolPortalTheme');
        if (currentTheme) root.setAttribute('data-theme', currentTheme);

        function toggleTheme() {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('schoolPortalTheme', next);
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-collapsed');
            const isCollapsed = document.body.classList.contains('sidebar-collapsed');
            localStorage.setItem('sidebarState', isCollapsed ? 'collapsed' : 'expanded');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sidebarState = localStorage.getItem('sidebarState');
            if (sidebarState === 'collapsed') {
                document.body.classList.add('sidebar-collapsed');
            }
            
            const logoBlock = document.getElementById('sidebarLogoBlock');
            if (logoBlock) {
                logoBlock.addEventListener('click', () => {
                    if (document.body.classList.contains('sidebar-collapsed')) {
                        toggleSidebar();
                    }
                });
            }
        });
    </script>
</body>
</html>
